name: Build Weibo Spark APK

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "*.gradle"
      - "gradle.properties"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore stable debug signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: weibo-spark-debug-keystore-v1

      - name: Build installable debug APK
        run: gradle --no-daemon --console=plain :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WeiboSparkAssistant-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
